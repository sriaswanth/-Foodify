services:
  # Backend Web Service
  - type: web
    name: foodify-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  # Frontend Static Site (Corrected for Render Blueprint spec)
  - type: web
    name: foodify-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: foodify-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
